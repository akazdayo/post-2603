name: Build and Deploy Typst PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-ipafont-gothic

      - name: Resolve Typst font path
        run: |
          font_file="$(fc-match -f '%{file}\n' IPAGothic)"
          echo "IPA_FONT_DIR=$(dirname "$font_file")" >> "$GITHUB_ENV"

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.14.2

      - name: Build PDF and Pages site
        run: |
          mkdir -p _site
          typst compile main.typ _site/main.pdf --font-path "$IPA_FONT_DIR"
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
